name: Deploy Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TRANSKRIBUS_USER: ${{ secrets.TRANSKRIBUS_USER }}
      TRANSKRIBUS_PASSWORD: ${{ secrets.TRANSKRIBUS_PASSWORD }}
      DISPUTATION_TRANSKRIBUS_CONFIG: ${{ secrets.DISPUTATION_TRANSKRIBUS_CONFIG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare Transkribus config (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${DISPUTATION_TRANSKRIBUS_CONFIG:-}" ]]; then
            mkdir -p config
            cat > config/disputation_transkribus.json <<'JSON'
${{ secrets.DISPUTATION_TRANSKRIBUS_CONFIG }}
JSON
            echo "Transkribus config written from secret."
          else
            echo "No DISPUTATION_TRANSKRIBUS_CONFIG secret set; using repository/default files."
          fi

      - name: Sync Disputation from Transkribus (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${TRANSKRIBUS_USER:-}" && -n "${TRANSKRIBUS_PASSWORD:-}" && -f config/disputation_transkribus.json ]]; then
            python -m pip install --upgrade pip
            pip install requests
            python3 scripts/sync_disputation_transkribus.py --config config/disputation_transkribus.json
          else
            echo "Skipping Transkribus sync (missing credentials or config)."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
